<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERMUU SYSTEM // PAIRING PANEL</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --dark-bg: #0a0a0a;
            --terminal-bg: #111111;
        }
        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background-color: var(--terminal-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            color: var(--neon-green);
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
            letter-spacing: 2px;
        }
        p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 5px;
            color: var(--neon-green);
            font-size: 1.1rem;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
        }
        input[type="text"]:focus {
            border-color: var(--neon-green);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        button:hover {
            background-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }
        .output-box {
            margin-top: 25px;
            background: #000;
            border: 1px dashed var(--neon-green);
            padding: 15px;
            border-radius: 5px;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .code-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #fff;
        }
        .loading {
            color: #ffcc00;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <h1>ROOT_ACCESS // CYBERMUU</h1>
    <p>Ingiza namba yako ya WhatsApp kuanza kuunganisha bot (Weka namba kuanzia na code ya nchi, mfano: 25577.......)</p>
    
    <input type="text" id="phoneNumber" placeholder="255771234567">
    <button onclick="requestPairCode()">Get Pairing Code</button>

    <div class="output-box">
        <div id="result" class="code-display">KODI ITAONEKANA HAPA</div>
    </div>
</div>

<script>
    const socket = io();

    function requestPairCode() {
        const num = document.getElementById('phoneNumber').value.trim();
        if(!num) {
            alert('Tafadhali weka namba halali!');
            return;
        }
        document.getElementById('result').innerHTML = '<span class="loading">Inatafuta kodi...</span>';
        socket.emit('get_code', num);
    }

    socket.on('pair_code', (code) => {
        document.getElementById('result').innerText = code;
    });

    socket.on('error_msg', (msg) => {
        document.getElementById('result').innerHTML = `<span style="color: #ff3333">${msg}</span>`;
    });
</script>

</body>
</html>
