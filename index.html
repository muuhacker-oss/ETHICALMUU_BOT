<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERMUU SYSTEM // PAIRING PANEL</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --dark-bg: #03040b;
            --card-bg: rgba(13, 14, 37, 0.65);
            --input-bg: rgba(19, 21, 53, 0.8);
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* Pro Animated Background Tech Lines */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(189, 0, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotate(15deg);
            animation: bgMove 20s linear infinite;
            z-index: 1;
        }

        /* Glowing Background Orbs */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            z-index: 2;
            animation: floatGlow 15s ease-in-out infinite alternate;
        }
        .bg-glow-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(189, 0, 255, 0.08) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            z-index: 2;
            animation: floatGlow 12s ease-in-out infinite alternate-reverse;
        }

        /* MAIN PANEL CARD WITH PRO FLOATING ANIMATION */
        .panel-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15), inset 0 0 25px rgba(189, 0, 255, 0.1);
            padding: 35px 25px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10;
            position: relative;
            animation: smoothFloat 4.5s ease-in-out infinite; /* Smooth Up & Down Motion */
        }

        .profile-container {
            position: relative;
            width: 115px;
            height: 115px;
            margin: 0 auto 15px auto;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px var(--neon-blue);
        }

        .badge {
            background: linear-gradient(135deg, #00f0ff, #bd00ff);
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 5px 0;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 0.85rem;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #10b981;
            background: rgba(16, 185, 129, 0.15);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 1.5s infinite;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            background-color: var(--input-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 14px;
            color: #ffffff;
            font-size: 1.1rem;
            box-sizing: border-box;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        input[type="text"]:focus {
            border-color: var(--neon-purple);
            outline: none;
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.3);
            background-color: #0e102b;
        }

        .pair-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
            border: none;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 25px rgba(0, 240, 255, 0.25);
        }

        .pair-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.6);
        }

        .output-panel {
            margin-top: 25px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px dashed var(--neon-blue);
            padding: 20px;
            border-radius: 14px;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .code-text {
            font-size: 2.1rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 5px;
            text-shadow: 0 0 12px var(--neon-blue);
        }

        .loading-text {
            color: #ffaa00;
            font-size: 0.95rem;
            letter-spacing: 1px;
            animation: blink 1.2s infinite;
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 10px;
        }

        .footer-btn {
            flex: 1;
            padding: 11px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.1);
            color: #94a3b8;
            font-size: 0.75rem;
            border-radius: 10px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .footer-btn:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(189, 0, 255, 0.1));
            color: #ffffff;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* CORE PRO ANIMATIONS */
        @keyframes smoothFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        @keyframes bgMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow-2"></div>

<div class="panel-card">
    <div class="profile-container">
        <!-- Direct High-quality Imgur Backup for the CYBERMUU Avatar to prevent breaking -->
        <img src="https://i.imgur.com/A28MhD2.jpeg" class="profile-pic" alt="CYBERMUU">
    </div>
    
    <div class="badge">CYBERMUU V1</div>
    <h1>CYBERMUU</h1>
    <div class="subtitle">WhatsApp Bot Pairing System</div>

    <div class="status-indicator">
        <div class="status-dot"></div>
        SYSTEM ONLINE
    </div>
    
    <div class="input-group">
        <input type="text" id="phoneNumber" placeholder="255771234567">
    </div>
    
    <button class="pair-btn" onclick="requestPairCode()">✦ Pair Bot ✦</button>

    <div class="output-panel">
        <div id="result" class="code-text">---</div>
    </div>

    <div class="footer-links">
        <a href="#" class="footer-btn">♫ Music</a>
        <a href="#" class="footer-btn">☾ Overlay</a>
        <!-- Home Button linked directly to your official WhatsApp Channel -->
        <a href="https://whatsapp.com/channel/0029VaN3bIkEwEk5bOn3bI0f" target="_blank" class="footer-btn">🏠 Home</a>
    </div>
</div>

<script>
    const socket = io();

    function requestPairCode() {
        const num = document.getElementById('phoneNumber').value.trim();
        if(!num) {
            alert('Please enter a valid phone number!');
            return;
        }
        document.getElementById('result').className = "loading-text";
        document.getElementById('result').innerHTML = 'INCOMING CONNECTION...';
        socket.emit('get_code', num);
    }

    socket.on('pair_code', (code) => {
        document.getElementById('result').className = "code-text";
        document.getElementById('result').innerText = code;
    });

    socket.on('error_msg', (msg) => {
        document.getElementById('result').className = "loading-text";
        document.getElementById('result').innerHTML = `<span style="color: #ef4444">${msg}</span>`;
    });
</script>

</body>
</html>
