<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBERMUU SYSTEM // PAIRING PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background: #07090e; color: #fff; background-image: linear-gradient(0deg, transparent 24%, rgba(0, 242, 254, 0.03) 25%, rgba(0, 242, 254, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 242, 254, 0.03) 75%, rgba(0, 242, 254, 0.03) 76%, transparent 77%), linear-gradient(90deg, transparent 24%, rgba(0, 242, 254, 0.03) 25%, rgba(0, 242, 254, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 242, 254, 0.03) 75%, rgba(0, 242, 254, 0.03) 76%, transparent 77%); background-size: 30px 30px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; overflow-y: auto; }
        .container { width: 100%; max-width: 420px; background: rgba(13, 17, 23, 0.85); border: 2px solid #00f2fe; border-radius: 24px; padding: 25px; box-shadow: 0 0 25px rgba(0, 242, 254, 0.2); text-align: center; margin-bottom: 20px; }
        .avatar-box { width: 110px; height: 110px; margin: 0 auto 15px; border-radius: 50%; border: 3px solid #00f2fe; box-shadow: 0 0 15px #00f2fe; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { background: linear-gradient(45deg, #00f2fe, #4facfe); padding: 5px 15px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 15px; }
        h1 { font-size: 26px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); margin-bottom: 5px; }
        p { font-size: 11px; color: #8b949e; letter-spacing: 1px; margin-bottom: 20px; }
        .status-box { background: rgba(0, 255, 127, 0.1); border: 1px solid #00ff7f; color: #00ff7f; padding: 8px 20px; border-radius: 20px; display: inline-flex; align-items: center; font-size: 12px; font-weight: bold; gap: 8px; margin-bottom: 25px; }
        .status-dot { width: 8px; height: 8px; background: #00ff7f; border-radius: 50%; box-shadow: 0 0 8px #00ff7f; }
        input { width: 100%; padding: 16px; background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 14px; color: #fff; font-size: 16px; text-align: center; font-weight: bold; letter-spacing: 1.5px; outline: none; margin-bottom: 15px; transition: 0.3s; }
        input:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        button { width: 100%; padding: 16px; background: linear-gradient(45deg, #00f2fe, #4facfe); border: none; border-radius: 14px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6); }
        .response-box { width: 100%; min-height: 80px; background: rgba(255, 165, 0, 0.05); border: 1px dashed #ffa500; border-radius: 14px; padding: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #ffa500; font-size: 14px; margin-bottom: 25px; word-break: break-all; }
        .nav-buttons { display: flex; gap: 10px; justify-content: center; }
        .nav-btn { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; padding: 12px 18px; border-radius: 12px; font-size: 11px; color: #8b949e; cursor: pointer; text-transform: uppercase; transition: 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
        .nav-btn:hover { border-color: #00f2fe; color: #fff; }
        .nav-btn.active { border-color: #00f2fe; color: #fff; background: rgba(0, 242, 254, 0.05); box-shadow: inset 0 0 5px rgba(0, 242, 254, 0.2); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-box">
        <img src="/assets/logo.jpg" alt="CYBERMUU" onerror="this.style.display='none';">
        <span id="alt-avatar" style="color: #00f2fe; font-size: 12px; padding: 5px;">CYBERMUU</span>
    </div>

    <div class="badge">CYBERMUU V1</div>
    <h1>CYBERMUU</h1>
    <p>WHATSAPP BOT PAIRING SYSTEM</p>

    <div class="status-box">
        <div class="status-dot"></div>
        <span id="status-text">SYSTEM ONLINE</span>
    </div>

    <input type="text" id="phone-input" placeholder="255625816690">

    <button id="pair-btn" onclick="requestPairCode()">✨ PAIR BOT ✨</button>

    <div class="response-box" id="code-display">
        WAITING FOR NUMBER INPUT...
    </div>

    <div class="nav-buttons">
        <a href="https://chat.whatsapp.com/HRo7GsirzbpKfRY5nHRc43?s=cl&p=a&ilr=1" target="_blank" class="nav-btn">💬 GROUP</a>
        <a href="https://whatsapp.com/channel/0029Vb87xXC7z4knimhaAE3f" target="_blank" class="nav-btn">📢 CHANNEL</a>
        <button class="nav-btn active" onclick="location.reload()">🏠 REFRESH</button>
    </div>
</div>

<script>
    const socket = io();

    const img = document.querySelector('.avatar-box img');
    if (img) {
        img.onload = function() { document.getElementById('alt-avatar').style.display = 'none'; }
    }

    socket.on('connect', () => {
        document.getElementById('status-text').innerText = "SYSTEM ONLINE";
    });

    socket.on('disconnect', () => {
        document.getElementById('status-text').innerText = "SYSTEM OFFLINE";
        document.getElementById('code-display').innerText = "CONNECTION LOST...";
    });

    function requestPairCode() {
        let num = document.getElementById('phone-input').value;
        if(!num) {
            alert("Please enter your phone number!");
            return;
        }
        
        num = num.replace(/\s+/g, '');
        document.getElementById('code-display').innerHTML = '<span style="color: #ffa500; animation: blink 1s infinite;">GENERATING PAIRING CODE...</span>';
        socket.emit('get_code', num);
    }

    socket.on('pair_code', (code) => {
        document.getElementById('code-display').innerHTML = `
            <div style="font-size: 26px; color: #00ff7f; letter-spacing: 4px; text-shadow: 0 0 10px #00ff7f; font-weight: bold;">
                ${code}
            </div>
            <div style="font-size: 10px; color: #8b949e; margin-top: 5px; font-weight: normal;">
                Enter this code on WhatsApp -> Linked Devices
            </div>
        `;
    });

    socket.on('error_msg', (msg) => {
        document.getElementById('code-display').innerHTML = `<span style="color: #ff4a4a;">${msg}</span>`;
    });
</script>

</body>
</html>
